name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  workflow_call:
    inputs:
      tag:
        description: 'Existing tag to build and publish a release for (e.g. v1.2.3)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Derive Android versionCode from app version
        run: |
          node -e '
          const fs = require("fs");
          const cfg = JSON.parse(fs.readFileSync("app.json", "utf8"));
          const parts = String(cfg.expo.version).split(".").map((n) => parseInt(n, 10) || 0);
          const code = (parts[0] || 0) * 10000 + (parts[1] || 0) * 100 + (parts[2] || 0);
          cfg.expo.android = cfg.expo.android || {};
          cfg.expo.android.versionCode = code;
          fs.writeFileSync("app.json", JSON.stringify(cfg, null, 2) + "\n");
          console.log("versionName=" + cfg.expo.version + " versionCode=" + code);
          '

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK (Release)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Locate and name APK
        id: find_apk
        run: |
          SRC=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$SRC" ]; then
            echo "No APK was produced by the build" >&2
            exit 1
          fi
          VERSION=$(node -p "require('./app.json').expo.version")
          DEST="Digi2FM-v${VERSION}.apk"
          cp "$SRC" "$DEST"
          echo "apk_path=$DEST" >> "$GITHUB_OUTPUT"
          echo "Built $DEST (from $SRC)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Digi2FM-release
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 90

      - name: Create GitHub Release
        if: inputs.tag != '' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: ${{ steps.find_apk.outputs.apk_path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
