name: Auto Release

# When the app version in app.json (or package.json) changes on main,
# tag the commit and trigger the APK build + GitHub Release.
on:
  push:
    branches:
      - main
    paths:
      - 'app.json'
      - 'package.json'

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      created: ${{ steps.tag.outputs.created }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          if [ -z "$VERSION" ] || [ "$VERSION" = "undefined" ]; then
            echo "Could not read expo.version from app.json" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "App version is $VERSION"

      - name: Create tag if it does not exist
        id: tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists - nothing to release."
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG."
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: tag
    if: needs.tag.outputs.created == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/build-apk.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
